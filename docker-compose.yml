services:
  bot:
    build:
      context: .
      args:
        APP_UID: "${APP_UID:-1000}"
        APP_GID: "${APP_GID:-1000}"
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - bot-data:/data
      - "${LDAP_BIND_PASSWORD_FILE_HOST:-/dev/null}:/run/secrets/ldap_bind_password:ro"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bot-data:
